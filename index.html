<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ジャグラー実戦判定</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      background: #111;
      color: #fff;
    }

    h1 {
      font-size: 24px;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 18px;
    }

    input {
      width: 100%;
      font-size: 30px;
      padding: 10px;
      box-sizing: border-box;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      font-size: 26px;
      padding: 14px;
      margin-top: 22px;
      border-radius: 10px;
      border: none;
      background: #ff5555;
      color: white;
      font-weight: bold;
    }

    .card {
      background: #222;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      padding: 8px 0;
      border-bottom: 1px solid #444;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row.main {
      font-size: 32px;
      font-weight: bold;
    }

    .value {
      padding: 4px 12px;
      border-radius: 8px;
      min-width: 80px;
      text-align: right;
      color: #fff;
      font-weight: bold;
    }

    .confidence-value {
      font-weight: bold;
      font-size: 22px;
    }

    .rank {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>ジャグラー実戦判定</h1>

  <label>BIG</label>
  <input id="big" type="number" inputmode="numeric">

  <label>REG</label>
  <input id="reg" type="number" inputmode="numeric">

  <label>累計G</label>
  <input id="game" type="number" inputmode="numeric">

  <button onclick="calc()">計算</button>

  <div id="result"></div>

<script>
const settings = [1, 2, 3, 4, 5, 6];

const bigRate  = [273.1, 270.8, 266.4, 254.0, 240.1, 229.1];
const regRate  = [409.6, 385.5, 336.1, 290.0, 268.6, 229.1];
const combRate = [163.9, 159.1, 148.6, 135.4, 126.8, 114.6];

function scoreByBinomial(hit, game, rates) {
  const logs = rates.map(r => {
    const p = 1 / r;
    return hit * Math.log(p) + (game - hit) * Math.log(1 - p);
  });

  const maxLog = Math.max(...logs);
  let probs = logs.map(x => Math.exp(x - maxLog));
  const sum = probs.reduce((a, b) => a + b, 0);
  probs = probs.map(x => x / sum);

  let score = 0;
  for (let i = 0; i < 6; i++) {
    score += settings[i] * probs[i];
  }
  return score;
}

function fullScore(big, reg, game) {
  const logs = settings.map((_, i) => {
    const pb = 1 / bigRate[i];
    const pr = 1 / regRate[i];

    return (
      big * Math.log(pb) + (game - big) * Math.log(1 - pb) +
      reg * Math.log(pr) + (game - reg) * Math.log(1 - pr)
    );
  });

  const maxLog = Math.max(...logs);
  let probs = logs.map(x => Math.exp(x - maxLog));
  const sum = probs.reduce((a, b) => a + b, 0);
  probs = probs.map(x => x / sum);

  let score = 0;
  for (let i = 0; i < 6; i++) {
    score += settings[i] * probs[i];
  }
  return score;
}

function stdevP(arr) {
  const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
  const v = arr.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / arr.length;
  return Math.sqrt(v);
}

function confidenceRank(confidence) {
  if (confidence < 0.375) return "A";
  if (confidence < 0.600) return "B";
  if (confidence < 0.825) return "C";
  if (confidence < 1.050) return "D";
  return "E";
}

function confRankColor(rank) {
  if (rank === "A") return "#ff3333";
  if (rank === "B") return "#ff9999";
  if (rank === "C") return "#ffffff";
  if (rank === "D") return "#9dc3e6";
  return "#4472c4";
}

function scoreColor(score) {
  const min = 1;
  const max = 6;
  let t = (score - min) / (max - min);
  t = Math.max(0, Math.min(1, t));

  let r, g, b;

  if (t < 0.5) {
    const u = t / 0.5;
    r = Math.round(70 + (255 - 70) * u);
    g = Math.round(105 + (255 - 105) * u);
    b = Math.round(190 + (255 - 190) * u);
  } else {
    const u = (t - 0.5) / 0.5;
    r = 255;
    g = Math.round(255 + (70 - 255) * u);
    b = Math.round(255 + (70 - 255) * u);
  }

  return `rgb(${r},${g},${b})`;
}

function valueHtml(value, color) {
  return `<b class="value" style="background:${color};">${value}</b>`;
}

function calc() {
  const big = Number(document.getElementById("big").value);
  const reg = Number(document.getElementById("reg").value);
  const game = Number(document.getElementById("game").value);

  if (!game || game <= 0) {
    document.getElementById("result").innerHTML =
      "<div class='card'>累計Gを入力してくれ</div>";
    return;
  }

  const bigScore = scoreByBinomial(big, game, bigRate);
  const regScore = scoreByBinomial(reg, game, regRate);
  const combScore = scoreByBinomial(big + reg, game, combRate);
  const fs = fullScore(big, reg, game);

  const scoreStd = stdevP([bigScore, regScore, combScore]);
  const confidence = scoreStd / Math.sqrt(game / 6000);
  const confRank = confidenceRank(confidence);

  document.getElementById("result").innerHTML = `
  <div class="card">

    <div class="row">
      <span>BIGスコア</span>
      <b>${bigScore.toFixed(2)}</b>
    </div>

    <div class="row">
      <span>REGスコア</span>
      <b>${regScore.toFixed(2)}</b>
    </div>

    <div class="row">
      <span>合算スコア</span>
      <b>${combScore.toFixed(2)}</b>
    </div>

    <div class="row main">
      <span>最終スコア</span>
      <b>${fs.toFixed(2)}</b>
    </div>

    <div class="row">
      <span>確度</span>
      <b>
        ${confidence.toFixed(3)}
        (<span style="color:${confRankColor(confRank)}">${confRank}</span>)
      </b>
    </div>

  </div>
`;
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(registrations => {
    registrations.forEach(registration => registration.unregister());
  });
}

if ("caches" in window) {
  caches.keys().then(keys => {
    keys.forEach(key => caches.delete(key));
  });
}
</script>
</body>
</html>
